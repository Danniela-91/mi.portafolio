<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Mi Portafolio</title>
    <link rel="stylesheet" href="css/form.css" />
    <script
      src="https://kit.fontawesome.com/53366527e8.js"
      crossorigin="anonymous"></script>
  </head>
  <body>
    <header>
      <a href="index.html" class="logo"><p>Danni.</p></a>
      <!-- === lo sé que tengo que poner el P antes del a, pero se hago así no me sale como quiero === -->

      <nav>
        <ul>
          <li><a href="index.html" class="menu">home</a></li>
          <li><a href="index.html#about" class="menu">Sobre</a></li>
          <li><a href="index.html#formacion" class="menu">Formación</a></li>
          <li><a href="index.html#skills" class="menu">Skills</a></li>
          <li><a href="index.html#project" class="menu">Proyectos</a></li>
          <li><a href="form.html" class="btn-popup active">Contacto</a></li>
        </ul>
      </nav>
    </header>

    <!-- === FORM === -->
    <main>
      <section>
        <div class="wrapper">
          <span class="icon-close"
            ><a href="form.html"><i class="fa-solid fa-xmark"></i></a
          ></span>

          <div class="form-box">
            <h2>Contacta me</h2>
            <form action="#">
              <div class="input-box">
                <span class="icon"><i class="fa-solid fa-user"></i></span>
                <input type="text" id="name" required />
                <label for="name">Nombre</label>
              </div>

              <div class="input-box">
                <span class="icon"><i class="fa-solid fa-envelope"></i></span>
                <input type="email" id="email" required />
                <label for="email">E-mail</label>
              </div>

              <div class="input-box">
                <span class="icon"
                  ><i class="fa-solid fa-phone-volume"></i
                ></span>
                <input type="tel" id="tel" required />
                <label for="tel">Teléfono</label>
              </div>

              <div class="input-box">
                <span class="icon"><i class="fa-solid fa-message"></i></span>
                <input type="text" id="sujeto" required />
                <label for="sujeto">Sujeto</label>
              </div>

              <div class="textarea">
                <label for="mensaje"></label>
                <!-- <span class="icon-text"><i class="fa-solid fa-pencil"></i></span> -->
                <textarea
                  id="mensaje"
                  rows="5"
                  cols="40"
                  placeholder="Escríbe tu mensaje aquí "></textarea>
              </div>

              <div class="check-box">
                <div class="btn">
                  <button type="submit" title="Haz clic para enviar">
                    Enviar
                  </button>
                </div>
                <label>
                  <input type="checkbox" required />Acepto las
                  <a
                    href="#"
                    title="click para ver las políticas de privacidad">
                    políticas de privacidad.</a
                  ></label
                >
              </div>
            </form>
          </div>
        </div>
      </section>
    </main>
    <script src="js/form.js"></script>
  </body>
</html>
